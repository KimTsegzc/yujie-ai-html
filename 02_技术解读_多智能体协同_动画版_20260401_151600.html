<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <style>/* ===== CLAW v8 颜色主题系统（6套，由 theme-config.js 统一管理） =====
   修改颜色请编辑 theme-config.js，无需改动此文件
   ====================================================================== */

  /* ─── 默认主题：深海蓝（与主页面保持一致） ─── */
  :root {
    --gold:           #9ABCE0;
    --gold-bright:    #C4D4E6;
    --gold-dim:       rgba(154,188,224,0.15);
    --red:            #E07878;
    --green:          #6FCFA0;
    --bg:             #031E36;
    --bg2:            #04335A;
    --bg3:            #4474A3;
    --text:           #C4D4E6;
    --text-dim:       #9ABCE0;
    --border:         rgba(154,188,224,0.2);
    --sidebar-bg:     #021628;
    --sidebar-text:   #C4D4E6;
    --sidebar-active: rgba(154,188,224,0.15);
    --card-bg:        #04335A;
    --sidebar-w:      240px;
  }

  /* ─── 黑金 ─── */
  html[data-theme="black-gold"] {
    --bg:             #0A0A0F;
    --bg2:            #111118;
    --bg3:            #1C1C26;
    --gold:           #C9A84C;
    --gold-bright:    #E8C97A;
    --gold-dim:       rgba(201,168,76,0.15);
    --text:           #E8E4D8;
    --text-dim:       #9A9080;
    --border:         rgba(201,168,76,0.2);
    --red:            #FF5252;
    --green:          #2ED573;
    --sidebar-bg:     #060608;
    --sidebar-text:   #E8E4D8;
    --sidebar-active: rgba(201,168,76,0.12);
    --card-bg:        #111118;
  }

  /* ─── 深海蓝 ─── */
  html[data-theme="deep-ocean"] {
    --bg:             #031E36;
    --bg2:            #04335A;
    --bg3:            #4474A3;
    --gold:           #9ABCE0;
    --gold-bright:    #C4D4E6;
    --gold-dim:       rgba(154,188,224,0.15);
    --text:           #C4D4E6;
    --text-dim:       #9ABCE0;
    --border:         rgba(154,188,224,0.2);
    --red:            #E07878;
    --green:          #6FCFA0;
    --sidebar-bg:     #021628;
    --sidebar-text:   #C4D4E6;
    --sidebar-active: rgba(154,188,224,0.15);
    --card-bg:        #04335A;
  }

  /* ─── 冰川蓝 ─── */
  html[data-theme="glacier-blue"] {
    --bg:             #F5F1EC;
    --bg2:            #EAE4DD;
    --bg3:            #A8B5C2;
    --gold:           #2E4265;
    --gold-bright:    #1D3354;
    --gold-dim:       rgba(46,66,101,0.12);
    --text:           #2E4265;
    --text-dim:       #8599AB;
    --border:         rgba(46,66,101,0.2);
    --red:            #C0392B;
    --green:          #27AE60;
    --sidebar-bg:     #EAE4DD;
    --sidebar-text:   #2E4265;
    --sidebar-active: rgba(46,66,101,0.1);
    --card-bg:        #EAE4DD;
  }

  /* ─── 秋暮 ─── */
  html[data-theme="autumn-dusk"] {
    --bg:             #151D2B;
    --bg2:            #25344F;
    --bg3:            #617891;
    --gold:           #D5B893;
    --gold-bright:    #E8D4B8;
    --gold-dim:       rgba(213,184,147,0.15);
    --text:           #E8D4B8;
    --text-dim:       #D5B893;
    --border:         rgba(213,184,147,0.2);
    --red:            #C04048;
    --green:          #6FCFA0;
    --sidebar-bg:     #111828;
    --sidebar-text:   #E8D4B8;
    --sidebar-active: rgba(213,184,147,0.12);
    --card-bg:        #25344F;
  }

  /* ─── 落日余烬 ─── */
  html[data-theme="sunset-ember"] {
    --bg:             #1A1814;
    --bg2:            #2A261E;
    --bg3:            #74601B;
    --gold:           #FF971E;
    --gold-bright:    #FFB347;
    --gold-dim:       rgba(255,151,30,0.15);
    --text:           #F0E8DC;
    --text-dim:       #A8A7A3;
    --border:         rgba(255,151,30,0.2);
    --red:            #DB4600;
    --green:          #6FCFA0;
    --sidebar-bg:     #151210;
    --sidebar-text:   #F0E8DC;
    --sidebar-active: rgba(255,151,30,0.12);
    --card-bg:        #2A261E;
  }

  /* Legacy fallback */
  body, .content-bg { background-color: var(--bg) !important; color: var(--text); }
  h1, h2, h3, h4, h5, h6 { color: var(--gold); }
  a { color: var(--gold); }
  .highlight, .accent { color: var(--gold-bright); }
  .red-tag { color: var(--red); }
  .green-tag { color: var(--green); }
  
  /* ===== 暖米白/浅色主题安全覆盖 =====
     防止浅色背景下出现白字看不见的情况
  ===== */
  html[data-theme="glacier-blue"] body,
  html[data-theme="glacier-blue"] .scene,
  html[data-theme="glacier-blue"] .content-bg,
  html[data-theme="glacier-blue"] .slide,
  html[data-theme="glacier-blue"] .container {
    color: var(--text) !important;
  }
  /* 强制白字元素在浅色主题下用深色 */
  html[data-theme="glacier-blue"] [style*="color: white"],
  html[data-theme="glacier-blue"] [style*="color:#fff"] {
    color: var(--text) !important;
  }

  /* ===== 冰川蓝主题额外修复：浅色文字和线条 ===== */
  /* 修复硬编码浅色文字 */
  html[data-theme="glacier-blue"] .agent-role { color: var(--text-dim) !important; }
  html[data-theme="glacier-blue"] .agent-status { color: var(--text-dim) !important; background: rgba(46,66,101,0.08) !important; }
  html[data-theme="glacier-blue"] .log-time { color: var(--text-dim) !important; }
  html[data-theme="glacier-blue"] .log-content { color: var(--text) !important; }
  html[data-theme="glacier-blue"] .dialogue-time { color: var(--text-dim) !important; }
  html[data-theme="glacier-blue"] .dialogue-text { color: var(--text) !important; }
  html[data-theme="glacier-blue"] .dialogue-text em { color: var(--text-dim) !important; }
  html[data-theme="glacier-blue"] .tp-title { color: var(--text-dim) !important; }
  html[data-theme="glacier-blue"] .tp-steps { color: var(--text-dim) !important; }
  html[data-theme="glacier-blue"] .scene-title-label { color: var(--text-dim) !important; }
  html[data-theme="glacier-blue"] .footer-info { color: var(--text-dim) !important; }
  html[data-theme="glacier-blue"] .ai-badge { color: #fff !important; }
  
  /* 修复浅色线条/边框 */
  html[data-theme="glacier-blue"] .agent-card { border-color: rgba(46,66,101,0.2) !important; background: rgba(46,66,101,0.03) !important; }
  html[data-theme="glacier-blue"] .agent-card.active { border-color: rgba(46,66,101,0.4) !important; background: rgba(46,66,101,0.06) !important; }
  html[data-theme="glacier-blue"] .agent-avatar { border-color: rgba(46,66,101,0.3) !important; background: rgba(46,66,101,0.08) !important; }
  html[data-theme="glacier-blue"] .log-entry { background: rgba(46,66,101,0.04) !important; }
  html[data-theme="glacier-blue"] .dialogue-text { background: rgba(46,66,101,0.04) !important; }
  html[data-theme="glacier-blue"] .dialogue-area { background: rgba(46,66,101,0.03) !important; border-color: rgba(46,66,101,0.2) !important; }
  html[data-theme="glacier-blue"] .task-progress { background: rgba(46,66,101,0.03) !important; border-color: rgba(46,66,101,0.2) !important; }
  html[data-theme="glacier-blue"] .tp-bar { background: rgba(46,66,101,0.1) !important; }
  html[data-theme="glacier-blue"] .progress-bar { background: rgba(46,66,101,0.15) !important; }
  html[data-theme="glacier-blue"] .header { background: rgba(46,66,101,0.08) !important; border-bottom-color: rgba(46,66,101,0.2) !important; }
  html[data-theme="glacier-blue"] .agent-col-left { border-right-color: rgba(46,66,101,0.15) !important; background: rgba(46,66,101,0.04) !important; }
  html[data-theme="glacier-blue"] .coord-col { background: rgba(46,66,101,0.02) !important; }
  html[data-theme="glacier-blue"] .scene-title { border-color: rgba(46,66,101,0.3) !important; background: linear-gradient(135deg, rgba(46,66,101,0.1), rgba(46,66,101,0.03)) !important; }
  html[data-theme="glacier-blue"] .footer { border-top-color: rgba(46,66,101,0.15) !important; }
  html[data-theme="glacier-blue"] .coord-title { border-bottom-color: rgba(46,66,101,0.2) !important; }
  
  /* 修复背景透明度过高 - 主要卡片/面板 */
  html[data-theme="glacier-blue"] .agent-card { background: rgba(234,228,221,0.95) !important; }
  html[data-theme="glacier-blue"] .agent-card.active { background: rgba(234,228,221,0.95) !important; }
  html[data-theme="glacier-blue"] .agent-avatar { background: rgba(234,228,221,0.95) !important; }
  html[data-theme="glacier-blue"] .log-entry { background: rgba(234,228,221,0.95) !important; }
  html[data-theme="glacier-blue"] .dialogue-text { background: rgba(234,228,221,0.95) !important; }
  html[data-theme="glacier-blue"] .dialogue-area { background: rgba(234,228,221,0.85) !important; }
  html[data-theme="glacier-blue"] .task-progress { background: rgba(234,228,221,0.85) !important; }
  html[data-theme="glacier-blue"] .header { background: rgba(234,228,221,0.95) !important; }
  html[data-theme="glacier-blue"] .agent-col-left { background: rgba(234,228,221,0.85) !important; }
  html[data-theme="glacier-blue"] .coord-col { background: rgba(234,228,221,0.85) !important; }
  html[data-theme="glacier-blue"] .scene-title { background: linear-gradient(135deg, rgba(234,228,221,0.95), rgba(234,228,221,0.85)) !important; }
  
  /* 修复灰色文字看不清 */
  html[data-theme="glacier-blue"] .agent-role { color: var(--text-dim) !important; }
  html[data-theme="glacier-blue"] .agent-status { color: var(--text-dim) !important; background: rgba(234,228,221,0.95) !important; }
  html[data-theme="glacier-blue"] .log-time { color: var(--text-dim) !important; }
  html[data-theme="glacier-blue"] .log-content { color: var(--text) !important; }
  html[data-theme="glacier-blue"] .log-content em { color: var(--text-dim) !important; }
  html[data-theme="glacier-blue"] .scene-title-label { color: var(--text-dim) !important; }
  html[data-theme="glacier-blue"] .tp-title { color: var(--text-dim) !important; }
  html[data-theme="glacier-blue"] .tp-steps { color: var(--text-dim) !important; }
  html[data-theme="glacier-blue"] .dialogue-time { color: var(--text-dim) !important; }
  html[data-theme="glacier-blue"] .dialogue-text { color: var(--text) !important; }
  html[data-theme="glacier-blue"] .dialogue-text em { color: var(--text-dim) !important; }
  html[data-theme="glacier-blue"] .footer-info { color: var(--text-dim) !important; }

  /* ===== v17 等比缩放字体系统（Type Scale）===== */
  :root {
    /* 行高配合 */
    --leading-tight: 1.15;
    --leading-normal: 1.5;
    --leading-relaxed: 1.6;
    
    /* 基础7档字体变量 - 销冠Skills v17大号方案 (1.200比例，18px基准) */
    --text-h1:   56.9px;
    --text-h2:   42.7px;
    --text-h3:   32px;
    --text-h4:   24px;
    --text-lead: 20px;
    --text-body: 18px;
    --text-sm:   16px;
    
    /* 12档兼容层映射 */
    --font-xs:   var(--text-sm);
    --font-sm:   var(--text-sm);
    --font-base: var(--text-body);
    --font-md:   var(--text-body);
    --font-lg:   var(--text-h4);
    --font-xl:   var(--text-h3);
    --font-2xl:  var(--text-h2);
    --font-2xl2: var(--text-h2);
    --font-3xl:  var(--text-h1);
    --font-3xl2: var(--text-h1);
    --font-4xl:  var(--text-h1);
    --font-hero: var(--text-h1);
    
    /* 当前选中档次 */
    --current-xs:   var(--text-sm);
    --current-sm:   var(--text-sm);
    --current-base: var(--text-body);
    --current-md:   var(--text-body);
    --current-lg:   var(--text-h4);
    --current-xl:   var(--text-h3);
    --current-2xl:  var(--text-h2);
    --current-2xl2: var(--text-h2);
    --current-3xl:  var(--text-h1);
    --current-3xl2: var(--text-h1);
    --current-4xl:  var(--text-h1);
    --current-hero: var(--text-h1);
  }
  
  /* 小号方案 (1.200) */
  html[data-font-level="small"] {
    --text-h1: 39.8px; --text-h2: 33.2px; --text-h3: 27.6px; --text-h4: 23.0px;
    --text-lead: 19.2px; --text-body: 16.0px; --text-sm: 13.3px;
  }
  /* 中号方案 (1.250) - 默认 */
  html[data-font-level="medium"] {
    --text-h1: 48.8px; --text-h2: 39.1px; --text-h3: 31.3px; --text-h4: 25.0px;
    --text-lead: 20.0px; --text-body: 16.0px; --text-sm: 12.8px;
  }
  /* 大号方案 (1.333) */
  html[data-font-level="large"] {
    --text-h1: 75.9px; --text-h2: 56.9px; --text-h3: 42.7px; --text-h4: 32.0px;
    --text-lead: 24.0px; --text-body: 18.0px; --text-sm: 13.5px;
  }

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多智能体协同演示</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'PingFang SC','Microsoft YaHei',sans-serif;
  overflow:hidden; height:100vh; width:100vw;
}

/* starfield */
#starCanvas { position:fixed; inset:0; z-index:0; pointer-events:none; }

/* scanline effect */
.scanline {
  position:fixed; inset:0; z-index:1; pointer-events:none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
}

.page {
  position:relative; z-index:10;
  width: 1440px; height: 1080px;
  display:grid;
  grid-template-rows: 72px 1fr 60px;
}

/* HEADER */
.header {
  display:flex; align-items:center;
  padding:0 50px;
  background: rgba(0,0,0,0.4);
  border-bottom:1px solid rgba(201,168,76,0.15);
  backdrop-filter:blur(10px);
}
.h-logo {
  font-size:var(--text-body); letter-spacing:4px; color: var(--gold);
  margin-right:28px;
}
.h-title { font-size:var(--text-h3); font-weight:200; flex:1; }
.h-title em { color: var(--gold); font-style:normal; }
.h-live {
  display:flex; align-items:center; gap:10px;
  font-size:var(--text-body); color:var(--green);
  background:rgba(76,175,80,0.08); border:1px solid rgba(76,175,80,0.3);
  padding:6px 18px; border-radius:20px;
}
.live-dot {
  width:6px; height:6px; border-radius:50%; background:var(--green);
  animation:livePulse 1s infinite;
}
@keyframes livePulse {
  0%,100%{box-shadow:0 0 0 0 rgba(76,175,80,0.6);}
  50%{box-shadow:0 0 0 6px rgba(76,175,80,0);}
}

/* MAIN: 四个智能体 + 中央协调区 */
.main {
  display:grid;
  grid-template-columns: 320px 1fr;
  overflow:hidden;
}

/* ===== LEFT: 所有智能体（1x4纵向排列） ===== */
.agent-col-left {
  display:flex; flex-direction:column;
  gap:10px;
  padding:16px;
  border-right:1px solid rgba(201,168,76,0.08);
  background: rgba(0,0,0,0.2);
  overflow-y:auto;
}
.agent-card {
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:10px; padding:14px;
  transition:all 0.3s;
  display:flex; flex-direction:column;
}
.agent-card.active {
  border-color:rgba(201,168,76,0.3);
  background:rgba(201,168,76,0.05);
  box-shadow:0 0 20px rgba(201,168,76,0.1);
}
.agent-card.thinking {
  border-color:rgba(91,141,239,0.3);
  background:rgba(91,141,239,0.05);
}
.agent-card.error {
  border-color:rgba(255,107,107,0.3);
  background:rgba(255,107,107,0.05);
}
.agent-header {
  display:flex; align-items:center; gap:10px; margin-bottom:10px;
}
.agent-avatar {
  width:36px; height:36px; border-radius:50%;
  background:rgba(201,168,76,0.15); border:1px solid rgba(201,168,76,0.3);
  display:flex; align-items:center; justify-content:center;
  font-size:var(--text-body); flex-shrink:0;
}
.agent-info { flex:1; min-width:0; }
.agent-name { font-size:var(--text-body); font-weight:500; color: var(--gold); line-height:1.3; }
.agent-role { font-size: var(--text-sm); color:#999; }
.agent-status {
  font-size:var(--text-sm); padding:4px 12px; border-radius:10px;
  background:rgba(255,255,255,0.05); color:#888; flex-shrink:0;
}
.agent-status.working { color: var(--gold); background:rgba(201,168,76,0.1); }
.agent-status.done { color:var(--green); background:rgba(76,175,80,0.1); }
.agent-status.error { color:var(--red); background:rgba(255,107,107,0.1); }

/* AI 标识徽章 */
.ai-badge {
  font-size: var(--text-sm); padding:2px 8px; border-radius:10px;
  background:linear-gradient(135deg, rgba(91,141,239,0.3), rgba(156,39,176,0.3));
  color:#fff; font-weight:500; letter-spacing:1px;
  border:1px solid rgba(91,141,239,0.5);
  text-shadow:0 0 4px rgba(91,141,239,0.5);
}

.agent-log {
  flex:1; overflow-y:auto; scrollbar-width:none;
  display:flex; flex-direction:column; gap:6px;
  min-height:60px; max-height:90px;
}
.agent-log::-webkit-scrollbar { display:none; }
.log-entry {
  font-size:var(--text-sm); padding:10px 12px;
  background:rgba(255,255,255,0.03);
  border-radius:6px; border-left:2px solid transparent;
  animation:logIn 0.2s both;
}
@keyframes logIn { from{opacity:0;transform:translateX(-8px);} to{opacity:1;transform:translateX(0);} }
.log-entry.send { border-left-color: var(--gold); }
.log-entry.receive { border-left-color:#5B8DEF; }
.log-entry.error { border-left-color:var(--red); background:rgba(255,107,107,0.05); }
.log-entry.retry { border-left-color:#febc2e; }
.log-time { font-size: var(--text-sm); color:#777; margin-bottom:4px; }
.log-content { color:#ccc; line-height:1.6; font-size:var(--text-sm); }
.log-content strong { color: var(--gold); }

/* ===== CENTER: 协调中枢 ===== */
.coord-col {
  display:flex; flex-direction:column;
  padding:20px 28px; gap:16px;
  overflow:hidden;
  background: rgba(0,0,0,0.1);
}
.coord-title {
  font-size:var(--text-body); letter-spacing:2px; color: var(--gold);
  padding-bottom:14px; border-bottom:1px solid rgba(201,168,76,0.1);
  display:flex; align-items:center; gap:10px;
}
.live-tag {
  display:flex; align-items:center; gap:6px;
  font-size: var(--text-sm); padding:4px 10px;
  background:rgba(76,175,80,0.15); color:var(--green);
  border:1px solid rgba(76,175,80,0.3); border-radius:20px;
}
.live-tag::before {
  content:'';
  width:6px; height:6px; border-radius:50%;
  background:var(--green);
  animation: livePulse 1.5s infinite;
}
@keyframes livePulse {
  0%, 100% { opacity:1; transform:scale(1); }
  50% { opacity:0.4; transform:scale(0.8); }
}

/* 场景标题展示 */
.scene-title {
  background:linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.05));
  border:1px solid rgba(201,168,76,0.3);
  border-radius:12px; padding:16px 20px;
  text-align:center;
  margin-bottom:12px;
  position:relative;
  overflow:hidden;
}
.scene-title::before {
  content:'';
  position:absolute;
  top:0; left:-100%;
  width:100%; height:100%;
  background:linear-gradient(90deg, transparent, rgba(201,168,76,0.1), transparent);
  animation: titleShine 3s infinite;
}
@keyframes titleShine {
  0%{left:-100%;}
  50%,100%{left:100%;}
}
.scene-title-label {
  font-size:var(--text-sm); color:#888; letter-spacing:2px;
  margin-bottom:8px; text-transform:uppercase;
}
.scene-title-text {
  font-size:var(--text-h4); color: var(--gold); font-weight:600;
  line-height:1.4;
}
.scene-title-num {
  display:inline-flex; align-items:center; justify-content:center;

  color: var(--gold); font-size:var(--text-sm); font-weight:600;
  margin-right:10px; vertical-align:middle;
}

/* 任务进度 */
.task-progress {
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:12px; padding:16px;
}
.tp-title { font-size:var(--text-body); color:#aaa; margin-bottom:12px; }
.tp-bar {
  height:6px; background:rgba(255,255,255,0.05);
  border-radius:3px; overflow:hidden;
}
.tp-fill {
  height:100%; background:linear-gradient(90deg, var(--gold), var(--gold));
  border-radius:3px; transition:width 0.6s;
}
.tp-steps {
  display:flex; justify-content:space-between;
  margin-top:10px; font-size:var(--text-sm); color:#888;
}
.tp-step.active { color: var(--gold); }
.tp-step.done { color:var(--green); }

/* 对话记录区 */
.dialogue-area {
  flex:1; background:rgba(255,255,255,0.02);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:12px; padding:14px;
  overflow-y:auto; scrollbar-width:none;
}
.dialogue-area::-webkit-scrollbar { display:none; }

.dialogue-msg {
  display:flex; gap:10px; margin-bottom:12px;
  animation:msgIn 0.4s both;
}
@keyframes msgIn { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
.dialogue-avatar {
  width:28px; height:28px; border-radius:50%;
  background:rgba(201,168,76,0.15); border:1px solid rgba(201,168,76,0.3);

}

.dialogue-avatar.planner { background:rgba(201,168,76,0.15); border-color:rgba(201,168,76,0.3); }
.dialogue-avatar.executor { background:rgba(76,175,80,0.15); border-color:rgba(76,175,80,0.3); }
.dialogue-avatar.coordinator { background:rgba(156,39,176,0.15); border-color:rgba(156,39,176,0.3); }

.dialogue-content { flex:1; }
.dialogue-header {
  display:flex; align-items:center; gap:8px; margin-bottom:4px;
}
.dialogue-name { font-size:var(--text-body); font-weight:500; }
.dialogue-name.analyst { color:#5B8DEF; }
.dialogue-name.planner { color: var(--gold); }
.dialogue-name.executor { color:var(--green); }
.dialogue-name.coordinator { color:#9C27B0; }
.dialogue-time { font-size:var(--text-sm); color:#777; }
.dialogue-text {
  font-size:var(--text-body); color:#ccc; line-height:1.8;
  padding:12px 16px; background:rgba(255,255,255,0.03);
  border-radius:8px;
}
.dialogue-text strong { color: var(--gold); }
.dialogue-text em { color:#888; font-style:normal; }

.error-notice {
  background:rgba(255,107,107,0.08);
  border:1px solid rgba(255,107,107,0.2);
  border-radius:8px; padding:10px 12px;
  margin:8px 0; font-size: var(--text-sm); color:var(--red);

.retry-notice {

/* FOOTER */

.ctrl-btn {

.progress-fill { height:100%; background:var(--gold); transition:width 0.4s; }
.footer-info {

/* 连接线动画 */
.connection-line {
  position:absolute;

const sc=document.getElementById('starCanvas');
const sx=sc.getContext('2d');
function resizeStar(){sc.width=window.innerWidth;sc.height=window.innerHeight;}
resizeStar(); window.addEventListener('resize',resizeStar);
const stars=[];
for(let i=0;i<150;i++) stars.push({
  x:Math.random()*sc.width, y:Math.random()*sc.height,
  r:Math.random()*1.2+0.2,
  a:Math.random()*.6+.1,
  ta:Math.random()*.6+.1,
  speed:(Math.random()*.5+.5)*0.015
});
function animStars(){
  sx.clearRect(0,0,sc.width,sc.height);
  stars.forEach(s=>{
    s.a+=(s.ta-s.a)*s.speed;
    if(Math.abs(s.a-s.ta)<0.01){s.ta=Math.random()*.6+.1;}
    sx.globalAlpha=s.a; sx.fillStyle='var(--gold)';
    sx.beginPath(); sx.arc(s.x,s.y,s.r,0,Math.PI*2); sx.fill();
  });
  sx.globalAlpha=1;
  requestAnimationFrame(animStars);
}
animStars();

  } else if(options.isConflict) {
    extraClass = 'conflict';
    extraStyle = 'style="border:1px solid rgba(255,152,0,0.3);background:rgba(255,152,0,0.05);"';
  } else if(options.isWarning) {
    extraClass = 'warning';
    extraStyle = 'style="border:1px solid rgba(255,152,0,0.3);background:rgba(255,152,0,0.05);"';
  }
  
  div.innerHTML = `
    <div class="dialogue-avatar ${agent}">${avatar}</div>
    <div class="dialogue-content">
      <div class="dialogue-header">
        <span class="dialogue-name ${agent}">${name} <span class="ai-badge" style="font-size: var(--text-sm);padding:1px 6px;">AI</span></span>
        <span class="dialogue-time">${time}</span>
      </div>
      <div class="dialogue-text ${extraClass}" ${extraStyle}>${text}</div>
    </div>
  `;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function addLog(agent, text) {
  const logMap = {
    'analyst': 'logAnalyst',
    'planner': 'logPlanner',
    'executor': 'logExecutor',
    'coordinator': 'logCoordinator'
  };
  const el = document.getElementById(logMap[agent]);
  if(!el) return;
  
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `
    <div class="log-time">${new Date().toLocaleTimeString('zh-CN', {hour12:false})}</div>
    <div class="log-content">${text}</div>
  `;
  el.appendChild(entry);
  el.scrollTop = el.scrollHeight;
}

function addCoordLog(text, time) {
  const el = document.getElementById('logCoordinator');
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `
    <div class="log-time">${time}</div>
    <div class="log-content"><strong>协调中枢:</strong> ${text}</div>
  `;
  el.appendChild(entry);
  el.scrollTop = el.scrollHeight;
}

function setAgentStatus(agent, status) {
  const statusMap = {
    'analyst': 'statusAnalyst',
    'planner': 'statusPlanner',
    'executor': 'statusExecutor',
    'coordinator': 'statusCoordinator'
  };
  const cardMap = {
    'analyst': 'agentAnalyst',
    'planner': 'agentPlanner',
    'executor': 'agentExecutor',
    'coordinator': 'agentCoordinator'
  };
  
  const statusEl = document.getElementById(statusMap[agent]);
  const cardEl = document.getElementById(cardMap[agent]);
  
  const statusText = {
    'working': '执行中',
    'done': '已完成',
    'error': '出错',
    'waiting': '待命'
  };
  
  statusEl.textContent = statusText[status] || status;
  statusEl.className = 'agent-status ' + status;
  
  cardEl.classList.remove('active', 'thinking', 'error');
  if(status === 'working') cardEl.classList.add('thinking');
  else if(status === 'done') cardEl.classList.add('active');
  else if(status === 'error') cardEl.classList.add('error');
}

function setProgress(value) {
  document.getElementById('tpFill').style.width = value + '%';
  const stepIdx = Math.floor(value / 25);
  for(let i=0; i<5; i++) {
    const el = document.getElementById('ts'+i);
    el.classList.remove('active', 'done');
    if(i < stepIdx) el.classList.add('done');
    else if(i === stepIdx) el.classList.add('active');
  }
}

function clearDemo() {
  stepTimers.forEach(t=>clearTimeout(t));
  stepTimers=[];
  document.getElementById('dialogueArea').innerHTML='';
  document.getElementById('logAnalyst').innerHTML='';
  document.getElementById('logPlanner').innerHTML='';
  document.getElementById('logExecutor').innerHTML='';
  document.getElementById('logCoordinator').innerHTML='';
  ['analyst','planner','executor','coordinator'].forEach(a=>setAgentStatus(a,'waiting'));
  setProgress(0);
}

function updateSceneTitle(n) {
  const sceneNum = document.getElementById('sceneNum');
  const sceneName = document.getElementById('sceneName');
  const sceneTitle = document.getElementById('sceneTitle');
  
  sceneNum.textContent = n + 1;
  sceneName.textContent = demos[n].label;
  
  // 添加动画效果
  sceneTitle.style.animation = 'none';
  sceneTitle.offsetHeight; // 触发重绘
  sceneTitle.style.animation = 'titleShine 0.5s ease-out';
}

function runDemo(n) {
  clearDemo();
  currentDemo=n;
  document.getElementById('footerInfo').textContent=`第${n+1}步 / 共3步`;
  document.getElementById('pgFill').style.width=`${((n+1)/3)*100}%`;
  
  // 更新中央场景标题
  updateSceneTitle(n);
  
  const demo=demos[n];
  let delay=600;
  
  demo.steps.forEach((step,i)=>{
    const t=setTimeout(()=>{
      if(step.type==='dialogue'){
        addDialogue(step.agent, step.name, step.avatar, step.text, step.time, {
          isError: step.isError,
          isRetry: step.isRetry,
          isApology: step.isApology,
          isConflict: step.isConflict,
          isWarning: step.isWarning
        });
      }else if(step.type==='log'){
        addLog(step.agent, step.text);
      }else if(step.type==='coord'){
        addCoordLog(step.text, step.time);
      }else if(step.type==='status'){
        setAgentStatus(step.agent, step.status);
      }else if(step.type==='progress'){
        setProgress(step.value);
      }
    },delay);
    stepTimers.push(t);
    delay+=1400;
  });
}

// 快速跳转到当前演示的结束状态
function jumpToEnd() {
  clearDemo();
  const demo = demos[currentDemo];
  // 立即显示所有内容
  demo.steps.forEach(step => {
    if(step.type==='dialogue'){
      addDialogue(step.agent, step.name, step.avatar, step.text, step.time, {
        isError: step.isError,
        isRetry: step.isRetry,
        isApology: step.isApology,
        isConflict: step.isConflict,
        isWarning: step.isWarning
      });
    }else if(step.type==='log'){
      addLog(step.agent, step.text);
    }else if(step.type==='coord'){
      addCoordLog(step.text, step.time);
    }else if(step.type==='status'){
      setAgentStatus(step.agent, step.status);
    }else if(step.type==='progress'){
      setProgress(step.value);
    }
  });
}

function nextDemo(){
  // 先快速展示当前演示的完成状态
  jumpToEnd();
  // 2秒后切换到下一个演示，给观众更多时间看完
  setTimeout(()=>runDemo((currentDemo+1)%3), 2000);
}
function prevDemo(){ runDemo((currentDemo+2)%3); }
function resetDemo(){ 
  autoPlay=false;
  document.getElementById('playBtn').textContent='▶ 自动演示';
  clearDemo();
  currentDemo=0;
  document.getElementById('footerInfo').textContent='第1步 / 共3步';
  document.getElementById('pgFill').style.width='0%';
}

function togglePlay(){
  autoPlay=!autoPlay;
  document.getElementById('playBtn').textContent=autoPlay?'⏸ 暂停演示':'▶ 自动演示';
  if(autoPlay){
    runDemo(0);
    scheduleNext();
  }else{
    clearDemo();
  }
}
function scheduleNext(){
  if(!autoPlay) return;
  demoTimer=setTimeout(()=>{
    if(!autoPlay) return;
    const next=(currentDemo+1)%3;
    runDemo(next);
    scheduleNext();
  }, 15000);
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight')nextDemo();
  if(e.key==='ArrowLeft')prevDemo();
  if(e.key===' '){e.preventDefault();togglePlay();}
});

// 字体大小同步
window.addEventListener('message', (e) => {
  if (e.data && e.data.type === 'fontSize') {
    const size = e.data.size || 'medium';
    document.documentElement.setAttribute('data-font-level', size);
  }
});

</script>
