<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>数据智能 · 自动分析简报</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
/* ========== v17 等比缩放字体系统 ========== */
:root{
  --base-size:18px;
  --scale:1.333;
  --text-sm:calc(var(--base-size)/1.333);         /* 13.5 辅助标注 */
  --current-base:var(--base-size);                  /* 18 标准正文 */
  --text-body:var(--base-size);                     /* 18 正文 */
  --text-lead:calc(var(--base-size)*1.111);         /* 20 引导文字 */
  --text-h4:calc(var(--base-size)*1.333^1);         /* 24 小标题 */
  --text-h3:calc(var(--base-size)*1.333^2);         /* 32 标题 */
  --text-h2:calc(var(--base-size)*1.333^3);         /* 42 大标题 */
  --text-h1:calc(var(--base-size)*1.333^4);         /* 56 主标题 */

  /* ===== 主题色变量别名（映射到 theme-config.js 标准变量） ===== */
  /* theme-config.js 会通过 html[data-theme] 切换 --bg/--bg2/--gold 等标准变量 */
  /* 以下别名确保本页所有 CSS 属性跟随主题切换 */
  --bg-primary:var(--bg, #0a0e1a);
  --bg-secondary:var(--bg2, #111827);
  --bg-card:var(--bg3, #1a2236);
  --bg-hover:var(--bg3, #243049);
  --text-primary:var(--text, #e8e8e8);
  --text-secondary:var(--text-dim, #9ca3af);
  --accent:var(--gold, #c9a84c);
  --accent-light:var(--gold-bright, #e8c97a);
  --accent-bg:var(--gold-dim, rgba(201,168,76,0.1));
  --danger:var(--red, #ef4444);
  --success:var(--green, #22c55e);
  --border:var(--border, rgba(255,255,255,0.08));
  --border-accent:var(--border, rgba(201,168,76,0.3));
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{font-size:var(--base-size);}
body{
  font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif;
  background:var(--bg-primary);color:var(--text-primary);
  height:100vh;overflow:hidden;
}
/* ========== 页面容器 ========== */
.page{display:flex;flex-direction:column;height:100vh;}
/* Header */
.header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 24px;background:var(--bg-secondary);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.header-title{font-size:var(--text-h3);font-weight:700;color:var(--accent);letter-spacing:2px;}
.header-badge{
  font-size:var(--text-sm);color:var(--text-secondary);
  background:var(--accent-bg);padding:4px 12px;border-radius:20px;
  border:1px solid var(--border-accent);
}
.header-reset-btn{
  padding:4px 14px;border-radius:6px;font-size:var(--text-sm);
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  color:var(--text-dim);cursor:pointer;transition:all .3s;
  margin-left:auto;
}
.header-reset-btn:hover{background:rgba(255,255,255,0.08);color:var(--text);}
/* 主内容区 */
.main{display:flex;flex:1;overflow:hidden;}

/* ========== 对话区 (30%) ========== */
.chat-panel{
  width:30%;min-width:320px;display:flex;flex-direction:column;
  border-right:1px solid var(--border);background:var(--bg-secondary);
}
.chat-msgs{
  flex:1;overflow-y:auto;padding:16px;
  scrollbar-width:thin;scrollbar-color:rgba(201,168,76,0.3) transparent;
}
.chat-msgs::-webkit-scrollbar{width:4px;}
.chat-msgs::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.3);border-radius:2px;}
.chat-msgs::-webkit-scrollbar-track{background:transparent;}

.msg{margin-bottom:14px;animation:fadeIn .4s ease;}
.msg-user{
  text-align:right;
}
.msg-bubble{
  display:inline-block;max-width:88%;padding:10px 14px;border-radius:14px;
  font-size:var(--current-base);line-height:1.7;word-break:break-word;
}
.msg-ai .msg-bubble{
  background:rgba(255,255,255,0.04);color:var(--text-primary);
  border:1px solid var(--border);text-align:left;
}
.msg-user .msg-bubble{
  background:rgba(201,168,76,0.12);color:var(--accent-light);
  border:1px solid var(--border-accent);
}
.msg-system{font-size:var(--text-sm);color:var(--text-secondary);text-align:center;margin:8px 0;}

/* 推荐问题 */
.suggest-btns{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;padding:0 4px;}
.suggest-btn{
  font-size:var(--text-sm);padding:5px 10px;border-radius:8px;
  background:var(--accent-bg);color:var(--accent);border:1px solid var(--border-accent);
  cursor:pointer;transition:all .2s;
}
.suggest-btn:hover{background:rgba(201,168,76,0.2);transform:translateY(-1px);}

/* 输入区 */
.chat-input{
  padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0;
}
.input-box{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.03);border:1px solid var(--border);
  border-radius:12px;padding:8px 12px;cursor:pointer;transition:all .3s;
}
.input-box:hover{border-color:var(--border-accent);}
.input-box.active{border-color:rgba(201,168,76,0.6);box-shadow:0 0 12px rgba(201,168,76,0.15);}
.input-preview{
  flex:1;font-size:var(--current-base);color:var(--text-secondary);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.send-btn{
  width:32px;height:32px;border-radius:8px;border:none;
  background:var(--accent);color:#000;font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.send-btn:hover{background:var(--accent-light);transform:scale(1.05);}

/* ========== 工作区 (70%) ========== */
.work-panel{
  flex:1;display:flex;flex-direction:column;overflow:hidden;
  background:var(--bg-primary);
}
/* 步骤指示器 */
.steps-bar{
  display:flex;align-items:center;gap:4px;
  padding:10px 24px;background:rgba(0,0,0,0.2);
  border-bottom:1px solid var(--border);flex-shrink:0;
}
.step-item{
  display:flex;align-items:center;gap:6px;
  font-size:var(--text-sm);color:var(--text-secondary);
  padding:4px 12px;border-radius:20px;transition:all .3s;
}
.step-item.active{color:var(--accent);background:var(--accent-bg);border:1px solid var(--border-accent);}
.step-item.done{color:var(--success);}
.step-num{
  width:20px;height:20px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;
  background:rgba(255,255,255,0.08);color:var(--text-secondary);
}
.step-item.active .step-num{background:var(--accent);color:#000;}
.step-item.done .step-num{background:var(--success);color:#fff;}
.step-arrow{color:var(--text-secondary);font-size:10px;margin:0 2px;}

/* 工作区内容 */
.work-content{
  flex:1;display:flex;overflow:hidden;padding:16px 20px;gap:16px;
}

/* 左栏·文字简报 */
.brief-panel{
  flex:1;display:flex;flex-direction:column;
  background:rgba(255,255,255,0.02);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;
}
.brief-header{
  padding:14px 20px;border-bottom:1px solid var(--border);
  font-size:var(--text-h4);font-weight:700;color:var(--accent);
  display:flex;align-items:center;gap:8px;flex-shrink:0;
}
.brief-body{
  flex:1;overflow-y:auto;padding:16px 20px;
  scrollbar-width:thin;scrollbar-color:rgba(201,168,76,0.35) transparent;
}
.brief-body::-webkit-scrollbar{width:6px;}
.brief-body::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.35);border-radius:3px;}
.brief-body::-webkit-scrollbar-track{background:transparent;}

.brief-section{margin-bottom:18px;animation:fadeIn .6s ease;}
.brief-section-title{
  font-size:var(--text-lead);font-weight:700;color:var(--accent);
  margin-bottom:8px;padding-left:10px;border-left:3px solid var(--accent);
}
.brief-text{
  font-size:var(--current-base);line-height:2;color:#ccc;
}
.brief-text .highlight{color:var(--accent);font-weight:600;}
.brief-text .danger{color:var(--danger);font-weight:600;}
.brief-text .success{color:var(--success);font-weight:600;}
.brief-divider{border:none;border-top:1px solid var(--border);margin:14px 0;}

/* 右栏·可视化图表 */
.chart-panel{
  flex:1;display:flex;flex-direction:column;gap:12px;
  overflow-y:auto;padding-right:4px;
  scrollbar-width:thin;scrollbar-color:rgba(201,168,76,0.3) transparent;
}
.chart-panel::-webkit-scrollbar{width:5px;}
.chart-panel::-webkit-scrollbar-thumb{background:rgba(201,168,76,0.3);border-radius:3px;}
.chart-card{
  background:rgba(0,0,0,0.3);border:1px solid var(--border);
  border-radius:12px;padding:12px 16px;flex-shrink:0;
  animation:chartIn .8s ease;
}
.chart-title{
  font-size:var(--text-sm);color:var(--text-secondary);
  margin-bottom:8px;font-weight:600;
}
.chart-box{width:100%;height:240px;}

/* ========== 上传区（步骤1展示） ========== */
.upload-zone{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;padding:40px;
}
.upload-box{
  width:100%;max-width:480px;
  border:2px dashed var(--border-accent);border-radius:16px;
  padding:40px 30px;text-align:center;cursor:pointer;
  transition:all .3s;background:rgba(201,168,76,0.03);
}
.upload-box:hover{border-color:var(--accent);background:rgba(201,168,76,0.06);}
.upload-icon{font-size:42px;margin-bottom:12px;}
.upload-title{font-size:var(--text-h4);color:var(--accent);margin-bottom:6px;}
.upload-hint{font-size:var(--text-sm);color:var(--text-secondary);}

/* 数据预览 */
.data-preview{
  width:100%;max-width:640px;margin-top:8px;
  background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:12px;
  overflow:hidden;animation:fadeIn .5s ease;
}
.preview-header{
  padding:10px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  font-size:var(--text-sm);color:var(--text-secondary);
}
.preview-table{
  width:100%;font-size:var(--text-sm);
}
.preview-table th{
  padding:6px 10px;text-align:left;color:var(--accent);
  border-bottom:1px solid var(--border);font-weight:600;
}
.preview-table td{
  padding:5px 10px;color:var(--text-secondary);
  border-bottom:1px solid rgba(255,255,255,0.03);
}
.field-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.field-tag{
  font-size:11px;padding:2px 8px;border-radius:4px;
  background:rgba(201,168,76,0.1);color:var(--accent);border:1px solid var(--border-accent);
}

/* 导出操作栏 */
.export-bar{
  display:flex;align-items:center;justify-content:center;gap:12px;
  padding:12px 20px;border-top:1px solid var(--border);flex-shrink:0;
  background:rgba(0,0,0,0.2);
}
.export-btn{
  font-size:var(--text-sm);padding:8px 18px;border-radius:8px;
  border:1px solid var(--border-accent);background:var(--accent-bg);
  color:var(--accent);cursor:pointer;transition:all .2s;
}
.export-btn:hover{background:rgba(201,168,76,0.2);transform:translateY(-1px);}
.export-btn.primary{background:var(--accent);color:#000;font-weight:600;border:none;}
.export-btn.primary:hover{background:var(--accent-light);}

/* ========== 动画 ========== */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes chartIn{from{opacity:0;transform:translateY(16px) scale(0.97);}to{opacity:1;transform:translateY(0) scale(1);}}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.typing-cursor{display:inline-block;width:2px;height:1em;background:var(--accent);animation:pulse 1s infinite;margin-left:2px;vertical-align:middle;}

/* ========== 步骤内容容器 ========== */
.step-content{display:none;flex:1;overflow:hidden;}
.step-content.visible{display:flex;flex-direction:column;}
</style>
</head>
<body>
<div class="page" id="pageRoot">
  <div style="position:fixed;top:6px;right:12px;z-index:99999;font-size:12px;color:#c9a84c;font-weight:bold;opacity:0.7;pointer-events:none;letter-spacing:2px;">v3.19.5</div>
  <!-- Header -->
  <div class="header">
    <div class="header-title">数据智能 · 自动分析简报</div>
    <div class="header-badge">中后台数据组</div>
    <button class="header-reset-btn" onclick="resetAll()" title="重置演示">↺ 重置</button>
  </div>

  <!-- 主内容 -->
  <div class="main">
    <!-- 对话区 -->
    <div class="chat-panel">
      <div class="chat-msgs" id="chatMsgs"></div>
      <div class="chat-input">
        <div class="input-box" id="chatInputBox">
          <span class="input-preview" id="chatInputPreview">上传Excel/CSV开始分析</span>
          <button class="send-btn" onclick="sendChat()">↑</button>
        </div>
      </div>
    </div>

    <!-- 工作区 -->
    <div class="work-panel">
      <!-- 步骤指示器 -->
      <div class="steps-bar">
        <div class="step-item active" id="step0"><span class="step-num">1</span>上传数据</div>
        <span class="step-arrow">›</span>
        <div class="step-item" id="step1"><span class="step-num">2</span>生成简报</div>
        <span class="step-arrow">›</span>
        <div class="step-item" id="step2"><span class="step-num">3</span>专项追问</div>
        <span class="step-arrow">›</span>
        <div class="step-item" id="step3"><span class="step-num">4</span>简报定稿</div>
      </div>

      <!-- 步骤0：上传区 -->
      <div class="step-content visible" id="sc0">
        <div class="upload-zone">
          <div class="upload-box" id="uploadBox" onclick="simulateUpload()">
            <div class="upload-icon">📊</div>
            <div class="upload-title">拖拽Excel/CSV文件至此处</div>
            <div class="upload-hint">或点击选择文件 · 支持 .xlsx .xls .csv · 演示模式点击即可</div>
          </div>
          <div class="data-preview" id="dataPreview" style="display:none;"></div>
          <div class="suggest-btns" id="suggestBtns" style="display:none;"></div>
        </div>
      </div>

      <!-- 步骤1-3：简报+图表 双栏 -->
      <div class="step-content" id="sc1">
        <div class="work-content">
          <div class="brief-panel">
            <div class="brief-header">📋 分析简报</div>
            <div class="brief-body" id="briefBody1"></div>
          </div>
          <div class="chart-panel" id="chartPanel1"></div>
        </div>
      </div>
      <div class="step-content" id="sc2">
        <div class="work-content">
          <div class="brief-panel">
            <div class="brief-header">📋 不良率专项分析</div>
            <div class="brief-body" id="briefBody2"></div>
          </div>
          <div class="chart-panel" id="chartPanel2"></div>
        </div>
      </div>
      <div class="step-content" id="sc3">
        <div class="work-content">
          <div class="brief-panel">
            <div class="brief-header">📋 完整分析简报</div>
            <div class="brief-body" id="briefBody3"></div>
          </div>
          <div class="chart-panel" id="chartPanel3"></div>
        </div>
        <div class="export-bar" id="exportBar" style="display:none;">
          <button class="export-btn primary" onclick="alert('演示模式：已生成Word文档')">导出 Word</button>
          <button class="export-btn" onclick="alert('演示模式：已生成PDF文档')">导出 PDF</button>
          <button class="export-btn" onclick="alert('演示模式：已推送至管理层工作台')">推送至管理层</button>
          <button class="export-btn" onclick="alert('演示模式：已保存至简报库')">保存至简报库</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>

// 对话内容
const chatConvos = [
  {
    user:'上传了「Q1经营数据.xlsx」',
    ai:`已成功解析您的数据文件。\n\n检测到12个字段、2,856条记录，时间范围2026年1月至3月。包括：机构名称、月份、存款余额、贷款余额、不良率、利润等核心指标。\n\n我已为您推荐3个分析方向，也可以一键生成完整简报。`,

// ==================== 工具函数 ====================
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

async function typeText(el, html, speed=18){
  // 简化打字机：直接设置innerHTML后逐字显示
  el.innerHTML = html;
  const fullText = el.innerText;
  el.innerText = '';
  for(let i=0;i<fullText.length;i++){
    el.innerText = fullText.slice(0,i+1);
    await sleep(speed);
    if(el.classList.contains('skip-typing')){el.innerText=fullText;break;}
  }
}

async function typeAIMsg(text, speed=22){
  const msgs = document.getElementById('chatMsgs');
  const div = document.createElement('div');
  div.className='msg msg-ai';
  div.innerHTML=`<div class="msg-bubble"></div>`;
  msgs.appendChild(div);
  const bubble = div.querySelector('.msg-bubble');
  
  // 处理换行
  const lines = text.split('\n');
  for(let li=0;li<lines.length;li++){
    const span = document.createElement('span');
    span.style.display='block';
    if(lines[li]==='') span.style.height='8px';
    else span.textContent = lines[li];
    bubble.appendChild(span);
    // 打字效果
    if(lines[li]){
      const full = lines[li];
      span.textContent='';
      for(let i=0;i<full.length;i++){
        span.textContent=full.slice(0,i+1);
        msgs.scrollTop=msgs.scrollHeight;
        await sleep(speed);
      }
    }
    msgs.scrollTop=msgs.scrollHeight;
    await sleep(80);
  }
}

function addUserMsg(text){
  const msgs = document.getElementById('chatMsgs');
  const div = document.createElement('div');
  div.className='msg msg-user';
  div.innerHTML=`<div class="msg-bubble">${text}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
}

function addSystemMsg(text){
  const msgs = document.getElementById('chatMsgs');
  const div = document.createElement('div');
  div.className='msg-system';
  div.textContent=text;
  msgs.appendChild(div);
  msgs.scrollTop=msgs.scrollHeight;
}

function setInputHint(text){
  const el = document.getElementById('chatInputPreview');
  el.textContent = text || '输入追问...';
  if(text && text.startsWith('✨')){
    el.style.color='#c9a84c';
    el.style.fontWeight='600';
    const box = document.getElementById('chatInputBox');
    box.classList.add('active');
  } else {
    el.style.color='';
    el.style.fontWeight='';
    document.getElementById('chatInputBox').classList.remove('active');
  }
}

function showSuggests(items){
  const el = document.getElementById('suggestBtns');
  if(!items||!items.length){el.style.display='none';return;}
  el.innerHTML = items.map(s=>`<button class="suggest-btn" onclick="suggestClick('${s}')">${s}</button>`).join('');
  el.style.display='flex';
}

function suggestClick(text){
  document.getElementById('chatInputPreview').textContent = text;
  sendChat();
}

function updateSteps(){
  for(let i=0;i<4;i++){
    const el = document.getElementById('step'+i);
    el.classList.remove('active','done');
    if(i<currentStep) el.classList.add('done');
    else if(i===currentStep) el.classList.add('active');
  }
  // 显示对应步骤内容
  for(let i=0;i<4;i++){
    const sc = document.getElementById('sc'+i);
    sc.classList.toggle('visible', i===currentStep);
  }
}

// ==================== 发送对话 ====================
async function sendChat(){
  if(chatAnimating) return;
  
  const convIndex = currentStep; // 0,1,2,3
  if(convIndex >= chatConvos.length) return;
  
  const conv = chatConvos[convIndex];
  
  // 步骤0已在上传时处理
  if(convIndex === 0){
    // 已处理，跳到步骤1
    currentStep = 1;
    updateSteps();
    addUserMsg(conv.pendingHint.replace('✨ ',''));
    chatAnimating=true;
    await typeAIMsg(chatConvos[1].ai);
    chatAnimating=false;
    
    // 生成简报和图表
    await renderBriefAndCharts(1);
    
    setInputHint(chatConvos[1].pendingHint);
    showSuggests(chatConvos[1].suggests);
    pulseInput();
    return;
  }
  
  // 步骤1→2
  if(convIndex === 1){
    addUserMsg(conv.pendingHint);
    currentStep = 2;
    updateSteps();
    chatAnimating=true;
    await typeAIMsg(chatConvos[2].ai);
    chatAnimating=false;
    
    await renderBriefAndCharts(2);
    
    setInputHint(chatConvos[2].pendingHint);
    showSuggests(chatConvos[2].suggests);
    pulseInput();
    return;
  }
  
  // 步骤2→3
  if(convIndex === 2){
    addUserMsg(conv.pendingHint.replace('✨ ',''));
    currentStep = 3;
    updateSteps();
    chatAnimating=true;
    await typeAIMsg(chatConvos[3].ai);
    chatAnimating=false;
    
    await renderBriefAndCharts(3);
    
    setInputHint(null);
    showSuggests([]);
    
    // 显示导出栏
    document.getElementById('exportBar').style.display='flex';
    return;
  }
}

function pulseInput(){
  const box = document.getElementById('chatInputBox');
  box.classList.add('active');
  let f=0;
  const pi=setInterval(()=>{
    f++;
    box.style.borderColor=f%2===0?'rgba(201,168,76,0.3)':'rgba(201,168,76,0.8)';
    box.style.boxShadow=f%2===0?'0 0 8px rgba(201,168,76,0.1)':'0 0 18px rgba(201,168,76,0.25)';
    if(f>=5){clearInterval(pi);box.style.borderColor='';box.style.boxShadow='';}
  },400);
}

// ==================== 简报+图表渲染 ====================
async function renderBriefAndCharts(step){
  const briefBody = document.getElementById('briefBody'+step);
  const chartPanel = document.getElementById('chartPanel'+step);
  
  briefBody.innerHTML='';
  chartPanel.innerHTML='';
  
  const sections = briefContents[step];
  
  for(let i=0;i<sections.length;i++){
    const s = sections[i];
    const div = document.createElement('div');
    div.className='brief-section';
    if(s.title==='封面'){
      div.innerHTML=s.text;
    } else {
      div.innerHTML=`<div class="brief-section-title">▎${s.title}</div><div class="brief-text">${s.text}</div>`;
    }
    briefBody.appendChild(div);
    await sleep(400);
    briefBody.scrollTop=briefBody.scrollHeight;
  }
  
  // 渲染图表
  await sleep(300);
  if(step===1) await renderStep1Charts(chartPanel);
  if(step===2) await renderStep2Charts(chartPanel);
  if(step===3) await renderStep3Charts(chartPanel);
}

  parent.appendChild(card);

  chartInstances.push(chart);
  return chart;
}

<script>
// ★ v8：子页面主题同步 + 字体/可见性消息监听
// theme-config.js 已自动监听 postMessage({ type:'themeChange', theme:xxx })
// 并在加载时应用 localStorage 中的已存主题
window.addEventListener('message', (e) => {
  if (!e.data || !e.data.type) return;
  // 字体大小同步
  if (e.data.type === 'fontSize') {
    document.documentElement.setAttribute('data-font-level', e.data.size || 'medium');
  }
  // 可见性控制
  if (e.data.type === 'visibility') {
    // 可根据需要暂停/恢复动画
  }
});
// 通知父页面已就绪，可接收主题消息
try { parent.postMessage({ type: 'iframeReady' }, '*'); } catch(err) {}
</script>
