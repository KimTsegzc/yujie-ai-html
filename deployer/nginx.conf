server {
    listen 80;
    server_name _;

    root /var/www/yujie-ai-html;
    index index.html;

    # UTF-8 encoding for Chinese filenames
    charset utf-8;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript text/html;
    gzip_min_length 1000;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|mov|mp4)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # HTML files - no cache for fresh content
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Deny hidden files
    location ~ /\. {
        deny all;
    }
}
